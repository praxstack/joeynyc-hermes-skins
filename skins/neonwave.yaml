    - "tracing neon signal"
    - "syncing retro protocol"
    - "modulating frequency"
    - "rendering wireframe"
    - "charging flux capacitor"
    - "aligning laser array"
    - "parsing waveform"
  wings:
    - ["⟪▲", "▲⟫"]
    - ["⟪◇", "◇⟫"]
    - ["⟪⬡", "⬡⟫"]
    - ["⟪◎", "◎⟫"]

