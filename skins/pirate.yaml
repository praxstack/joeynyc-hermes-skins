  banner_dim: "#555555"
  banner_text: "#DDDDDD"
  ui_accent: "#FFFFFF"
  ui_label: "#AAAAAA"
  ui_ok: "#BBBBBB"
  ui_error: "#FFFFFF"
  ui_warn: "#999999"
  prompt: "#EEEEEE"
  input_rule: "#666666"
  response_border: "#AAAAAA"
  status_bar_bg: "#4B4B4B"
  status_bar_text: "#DDDDDD"
  status_bar_strong: "#FFFFFF"
  status_bar_dim: "#555555"
  status_bar_good: "#BBBBBB"
  status_bar_warn: "#999999"
  status_bar_bad: "#CCCCCC"
