  completion_menu_meta_bg: "#444444"
  completion_menu_meta_current_bg: "#A7A7A7"
  session_label: "#CCCCCC"
  session_border: "#555555"

spinner:
  waiting_faces:
    - "(☠)"
    - "(⚓)"
    - "(⛵)"
    - "(⚔)"
    - "(☠)"
  thinking_faces:
    - "(☠)"
    - "(⚓)"
    - "(⛵)"
    - "(⌁)"
    - "(⚔)"
  thinking_verbs:
    - "hoisting the sails"
    - "charting the course"
    - "loading the cannons"
    - "scanning the horizon"
    - "reading the map"
    - "tying the rigging"
    - "swabbing the deck"
    - "raising the flag"
  wings:
    - ["⟪☠", "☠⟫"]
    - ["⟪⚓", "⚓⟫"]
    - ["⟪⚔", "⚔⟫"]
    - ["⟪⛵", "⛵⟫"]

branding:
  agent_name: "Pirate Agent"
  welcome: "Ahoy! Welcome aboard, Captain. Type yer message or /help for orders."
  goodbye: "Fair winds and following seas! ☠"
  response_label: " ☠ Pirate "
  prompt_symbol: "☠ ❯ "
  help_header: "(☠) Captain's Orders"

tool_prefix: "│"

tool_emojis:
  terminal: "⚔"
  read_file: "📜"
  search_files: "🔭"
  web_search: "🧭"
  write_file: "🪶"

