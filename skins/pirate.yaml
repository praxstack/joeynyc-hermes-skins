  session_border: "#5C3A21"      # dark wood

spinner:
  waiting_faces:
    - "(☠)"
    - "(⚓)"
    - "(⚔)"
  thinking_faces:
    - "(☠)"
    - "(🧭)"
    - "(🏴)"
  thinking_verbs:
    - "charting course"
    - "reading the stars"
    - "consulting the map"
    - "hoisting the sails"
    - "scanning the horizon"
  wings:
    - ["☠ ", " ☠"]
    - ["⚓ ", " ⚓"]
    - ["⚔ ", " ⚔"]
    - ["☠ ", " ☠"]

