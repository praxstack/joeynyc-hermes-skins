# Telemate - DOS BBS terminal program aesthetic (v4.2x era)
# Cyan status bar, white-on-black terminal, ANSI BBS vibes
# ATDT HERMES.BBS / CONNECT 57600 / NO CARRIER
name: telemate
description: Telemate DOS terminal revival. Cyan status bar, BBS ANSI vibes, modem call-outs.

colors:
  # Telemate palette: bright white terminal text, iconic cyan status bar
  banner_border: "#00CCCC"
  banner_title: "#FFFFFF"
  banner_accent: "#00FFFF"
  banner_dim: "#0088BB"
  banner_text: "#CCCCCC"
  ui_accent: "#00FFFF"
  ui_label: "#00CCCC"
  ui_ok: "#00FF88"
  ui_error: "#FF4444"
  ui_warn: "#FFCC00"
  prompt: "#FFFFFF"
  input_rule: "#0088BB"
  response_border: "#00CCCC"
  session_label: "#00FFFF"
  session_border: "#005577"

spinner:
  waiting_faces:
    - "(♪)"
    - "(♫)"
    - "(•)"
    - "(○)"
    - "(◉)"
  thinking_faces:
    - "[▁]"
    - "[▃]"
    - "[▅]"
    - "[▇]"
    - "[▅]"
    - "[▃]"
  thinking_verbs:
    - "DIALING"
    - "NEGOTIATING"
    - "HANDSHAKE"
    - "CARRIER DETECT"
    - "TRANSMITTING"
    - "RECEIVING PACKET"
    - "AT COMMAND"
    - "BUFFERING XMODEM"
  wings:
    - ["«", "»"]
    - ["‹", "›"]
    - ["[", "]"]
    - ["<", ">"]

